version: "3.9"

services:
  app:
    build: .
    container_name: tingchenggis
    ports:
      - "8092:8092"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8092
    volumes:
      - uploads:/app/data/uploads
    restart: unless-stopped

volumes:
  uploads:

