name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Frontend test (Vitest + jsdom)
        run: |
          npm ci
          npm test

      - name: Backend test (Maven)
        run: mvn clean test -B

      - name: Package JAR
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingchenggis-jar
          path: target/*.jar

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tingchenggis:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image & healthcheck
        run: |
          docker run --rm -d --name tc-test -p 8092:8092 tingchenggis:ci
          timeout 60 sh -c 'until curl -sf http://localhost:8092/actuator/health; do sleep 3; done'
          echo " HEALTHY"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: E2E test (Playwright)
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test

      - name: Cleanup
        run: docker stop tc-test || true

