# =============================================================================
# TingChengGIS CI/CD Pipeline
#
# Triggers:
#   push / PR → master, develop   — CI (test + docker)
#   tag v*                        — CI + Release (GitHub Release + deploy ZIP)
#   workflow_dispatch             — manual full pipeline
# =============================================================================
name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run-deploy:
        description: 'Run deployment step (requires DEPLOY_* secrets)'
        type: boolean
        default: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. CI — Test & Package
  # ──────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Frontend test (Vitest + jsdom)
        run: |
          npm ci
          npm test

      - name: Backend test (Maven)
        run: mvn clean test -B

      - name: Package JAR
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingchenggis-jar
          path: target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Docker — Build image + healthcheck + E2E
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tingchenggis:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image & healthcheck
        run: |
          docker run --rm -d --name tc-test -p 8092:8092 tingchenggis:ci
          timeout 60 sh -c 'until curl -sf http://localhost:8092/actuator/health; do sleep 3; done'
          echo "✅ HEALTHY"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: E2E test (Playwright)
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test

      - name: Cleanup
        if: always()
        run: docker stop tc-test || true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy Package — Assemble deploy/ + JAR into a release-ready ZIP
  # ──────────────────────────────────────────────────────────────────────────
  package-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: tingchenggis-jar
          path: deploy/

      - name: Rename JAR to canonical name
        run: |
          mv deploy/*.jar deploy/tingchenggis.jar
          chmod +x deploy/*.bat
          echo "${{ github.sha }}" > deploy/VERSION

      - name: Download JRE 21 (Windows x64) for embedded use
        run: |
          echo "[INFO] Downloading Eclipse Temurin JRE 21 for Windows x64..."
          curl -sL "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse" \
            -o /tmp/jre21-windows.zip --connect-timeout 30 --max-time 120
          echo "[INFO] Extracting JRE..."
          mkdir -p /tmp/jre-extract
          unzip -q /tmp/jre21-windows.zip -d /tmp/jre-extract
          JRE_DIR=$(find /tmp/jre-extract -maxdepth 2 -name "jre" -type d | head -1)
          if [ -z "$JRE_DIR" ]; then
            # jdk含jre的路径不同，尝试 jdk-*/ 下的 jre 目录
            JRE_DIR=$(find /tmp/jre-extract -maxdepth 3 -path "*/jre" -type d | head -1)
          fi
          if [ -n "$JRE_DIR" ]; then
            mv "$JRE_DIR" deploy/jre
            rm -rf /tmp/jre21-windows.zip /tmp/jre-extract
            echo "[OK] JRE 21 bundled ($(du -sh deploy/jre | cut -f1))"
          else
            echo "[WARN] JRE directory not found; JRE will need manual download"
            ls -la /tmp/jre-extract/
            rm -rf /tmp/jre21-windows.zip /tmp/jre-extract
          fi

      - name: Package deploy ZIP
        run: |
          cd deploy
          zip -9 -r ../tingchenggis-deploy.zip . \
            -x ".gitkeep" -x "temp/*" -x "logs/*" -x "data/*.mv.db"
          cd ..
          sha256sum tingchenggis-deploy.zip > tingchenggis-deploy.zip.sha256

      - name: Upload deploy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingchenggis-deploy
          path: |
            tingchenggis-deploy.zip
            tingchenggis-deploy.zip.sha256
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Installer — Build portable EXE (app-image) + MSI installer (Windows)
  # ──────────────────────────────────────────────────────────────────────────
  package-installer:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: tingchenggis-jar
          path: staging

      - name: Rename JAR and prepare staging
        run: |
          Move-Item -Path staging\*.jar -Destination staging\tingchenggis.jar -Force
          Copy-Item -Path deploy\application-demo.yml -Destination staging\application-demo.yml
          New-Item -ItemType Directory -Path staging\data -Force | Out-Null
          New-Item -ItemType Directory -Path staging\logs -Force | Out-Null
          echo "Staging ready"

      - name: Download JRE 21 for bundling
        run: |
          curl -sL "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse" -o jre.zip
          Expand-Archive -Path jre.zip -DestinationPath jre-extract
          $jreDir = Get-ChildItem -Path jre-extract -Directory | Select-Object -First 1
          Move-Item -Path "$($jreDir.FullName)" -Destination jre -Force
          echo "JRE downloaded"

      - name: Install WiX Toolset (for MSI)
        run: |
          choco install wixtoolset --no-progress -y
          echo "WiX installed"

      - name: Build portable app-image (EXE)
        run: |
          jpackage --type app-image --name TingChengGIS --app-version 1.0.0 `
            --input staging --main-jar tingchenggis.jar `
            --main-class com.tingchenggis.tingcheng.TingChengGISTingChengApplication `
            --runtime-image jre --win-console `
            --java-options "-Dfile.encoding=UTF-8" --java-options "-Xmx1024m" `
            --java-options "--spring.config.additional-location=file:app/application-demo.yml" `
            --vendor "TingChengGIS" --dest output
          echo "app-image created"

      - name: Build MSI installer
        run: |
          $env:Path += ";${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          jpackage --type msi --name TingChengGIS --app-version 1.0.0 `
            --input staging --main-jar tingchenggis.jar `
            --main-class com.tingchenggis.tingcheng.TingChengGISTingChengApplication `
            --runtime-image jre --win-console --win-menu --win-shortcut `
            --java-options "-Dfile.encoding=UTF-8" --java-options "-Xmx1024m" `
            --java-options "--spring.config.additional-location=file:app/application-demo.yml" `
            --vendor "TingChengGIS" --dest output
          echo "MSI created"

      - name: Upload portable app-image artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingchenggis-portable
          path: output/TingChengGIS/
          retention-days: 30

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingchenggis-msi
          path: output/*.msi
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Release — Create GitHub Release (only on tag push v*)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: [test, package-deploy, package-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p release
          # Deploy package
          cp artifacts/tingchenggis-deploy/tingchenggis-deploy.zip release/
          cp artifacts/tingchenggis-deploy/tingchenggis-deploy.zip.sha256 release/
          # Portable
          cp -r artifacts/tingchenggis-portable release/tingchenggis-portable
          cd release && zip -9 -r tingchenggis-portable.zip tingchenggis-portable && rm -rf tingchenggis-portable && cd ..
          # MSI
          cp artifacts/tingchenggis-msi/*.msi release/
          ls -lh release/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo 'notes<<EOF'
            echo "## TingChengGIS $TAG"
            echo ''
            echo '### 构建信息'
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- 构建日期: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ''
            echo '### 下载选项'
            echo '| 格式 | 说明 | 适用场景 |'
            echo '|------|------|----------|'
            echo '| `tingchenggis-deploy.zip` | 完整部署包（JAR + 启动脚本 + JRE + 配置） | 解压后双击 Start-TingChengGIS.bat 启动 |'
            echo '| `tingchenggis-portable.zip` | 免安装便携版（TingChengGIS.exe 启动器） | 解压后双击 TingChengGIS.exe 直接运行 |'
            echo '| `TingChengGIS-1.0.0.msi` | Windows 安装程序 | 安装后从开始菜单/桌面快捷方式启动 |'
            echo ''
            echo '### 系统要求'
            echo '- Windows 10/11 64位'
            echo '- 无需预装 Java（JRE 已内置）'
            echo '- 4GB+ 内存推荐'
            echo ''
            echo '### 部署方式'
            echo '**ZIP 部署包：** 解压 → 双击 `Start-TingChengGIS.bat` → 浏览器访问 http://localhost:8092'
            echo ''
            echo '**便携版：** 解压 → 双击 `TingChengGIS.exe` → 自动打开浏览器'
            echo ''
            echo '**MSI 安装：** 运行安装程序 → 从开始菜单启动 → 浏览器访问 http://localhost:8092'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TingChengGIS ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            release/tingchenggis-deploy.zip
            release/tingchenggis-deploy.zip.sha256
            release/tingchenggis-portable.zip
            release/*.msi
          draft: false
          prerelease: false
          generate_release_notes: false

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Deploy to Remote Server (SSH)
  #    Requires GitHub Secrets:
  #      DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: [test, package-deploy]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/master'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && (github.event_name != 'workflow_dispatch' || inputs.run-deploy)
    environment: production
    steps:
      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: tingchenggis-deploy
          path: deploy-pkg

      - name: Extract package
        run: |
          cd deploy-pkg
          unzip -o tingchenggis-deploy.zip -d tingchenggis
          ls -la tingchenggis/

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "deploy-pkg/tingchenggis/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_components: 2

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            echo "[INFO] Restarting TingChengGIS on ${{ secrets.DEPLOY_HOST }}..."
            if command -v systemctl &> /dev/null && systemctl is-enabled tingchenggis &> /dev/null; then
              sudo systemctl restart tingchenggis
              sudo systemctl status tingchenggis --no-pager | head -20
            elif command -v supervisorctl &> /dev/null; then
              supervisorctl restart tingchenggis
            else
              # Fallback: kill and restart via nohup
              pkill -f tingchenggis.jar || true
              sleep 2
              cd ${{ secrets.DEPLOY_PATH }}
              nohup java -Dfile.encoding=UTF-8 -jar tingchenggis.jar \
                --spring.config.additional-location=application-demo.yml \
                > logs/startup.log 2>&1 &
              echo "[INFO] Process started, PID=$!"
            fi
            echo "✅ Deployment complete"

      - name: Health check
        run: |
          timeout 60 sh -c 'until curl -sf http://${{ secrets.DEPLOY_HOST }}:8092/actuator/health; do sleep 3; done'
          echo "✅ Service is healthy"
