<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亭城路线分享</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #1a1a2e; color: #ccc; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 16px; }
        #map { height: 420px; border-radius: 6px; border: 1px solid rgba(255,255,255,.1); }
        .route-step { border-left: 3px solid #4a86e8; padding-left: 10px; margin: 6px 0; font-size: 13px; }
        h2 { font-size: 18px; color: #a4bfef; margin: 0 0 8px; }
        .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .toggle-group { display: flex; align-items: center; gap: 6px; }
        .toggle-label { font-size: 12px; color: #888; user-select: none; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,.12); border-radius: 22px; transition: .25s; border: 1px solid rgba(255,255,255,.15); }
        .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #ccc; border-radius: 50%; transition: .25s; }
        .switch input:checked + .slider { background: #4a86e8; border-color: #4a86e8; }
        .switch input:checked + .slider::before { transform: translateX(20px); background: #fff; }
        .toggle-name { font-size: 12px; color: #ccc; min-width: 48px; }
        #status { font-size: 13px; margin: 8px 0; padding: 8px 12px; border-radius: 4px; }
    </style>
</head>
<body>
<h2>滁州亭城 · 分享路线</h2>
<div class="bar">
    <div class="toggle-group">
        <span class="toggle-name">高德地图</span>
        <label class="switch">
            <input type="checkbox" id="toggleGaode" checked>
            <span class="slider"></span>
        </label>
    </div>
    <div class="toggle-group">
        <span class="toggle-name">OSM</span>
        <label class="switch">
            <input type="checkbox" id="toggleOsm">
            <span class="slider"></span>
        </label>
    </div>
    <small style="color:#888">底图切换</small>
</div>
<div id="status" style="background:rgba(255,255,255,.05);color:#a4bfef">正在加载...</div>
<div id="map"></div>
<div id="route-list" style="margin-top:8px"></div>
<a href="/" style="display:inline-block;margin-top:12px;color:#a4bfef;text-decoration:none;font-size:13px">&larr; 返回主系统</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    // GCJ-02 coordinate transform — WGS84 to GCJ02 for Gaode tiles
    function gcj02(lng, lat) {
        var PI=Math.PI, a=6378245, ee=0.00669342162296594323;
        function tLt(x,y){var r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r;}
        function tLn(x,y){var r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r;}
        var dLat=tLt(lng-105,lat-35),dLng=tLn(lng-105,lat-35),rad=lat/180*PI,m=Math.sin(rad);m=1-ee*m*m;
        var s=Math.sqrt(m);return[lng+(dLng*180)/(a/s*Math.cos(rad)*PI),lat+(dLat*180)/((a*(1-ee))/(m*s)*PI)];
    }

    var map, gaodeLayer, osmLayer, activeProvider = 'gaode';
    var params = new URLSearchParams(window.location.search), idsParam = params.get('ids');
    var statusEl = document.getElementById('status'), listEl = document.getElementById('route-list');
    var toggleGaode = document.getElementById('toggleGaode');
    var toggleOsm = document.getElementById('toggleOsm');

    function gaodeTileUrl() {
        var s = ['1','2','3','4'][Math.floor(Math.random()*4)];
        return 'https://webrd0'+s+'.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}';
    }

    function toCoord(lng, lat) {
        if (activeProvider === 'gaode' && toggleGaode.checked) {
            var g = gcj02(lng, lat);
            return [g[1], g[0]];
        }
        return [lat, lng];
    }

    map = L.map('map').setView([32.3123, 118.3178], 13);

    gaodeLayer = L.tileLayer(gaodeTileUrl(), {
        subdomains: ['1','2','3','4'],
        attribution: '&copy; 高德 | 亭城GIS',
        maxZoom: 18
    }).addTo(map);

    osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        subdomains: ['a','b','c'],
        attribution: '&copy; OSM',
        maxZoom: 18
    });

    function syncLayers() {
        var gaOn = toggleGaode.checked;
        var osmOn = toggleOsm.checked;

        if (gaOn && !map.hasLayer(gaodeLayer)) gaodeLayer.addTo(map);
        else if (!gaOn && map.hasLayer(gaodeLayer)) map.removeLayer(gaodeLayer);

        if (osmOn && !map.hasLayer(osmLayer)) osmLayer.addTo(map);
        else if (!osmOn && map.hasLayer(osmLayer)) map.removeLayer(osmLayer);

        // At least one layer must remain active
        if (!gaOn && !osmOn) {
            toggleGaode.checked = true;
            gaodeLayer.addTo(map);
        }

        activeProvider = (gaOn && !osmOn) ? 'gaode' : (!gaOn && osmOn) ? 'osm' : 'mixed';
    }

    toggleGaode.addEventListener('change', syncLayers);
    toggleOsm.addEventListener('change', syncLayers);

    async function load() {
        if (!idsParam) { statusEl.textContent='未提供路线参数 ids'; statusEl.style.background='rgba(255,200,0,.1)'; statusEl.style.color='#f39c12'; return; }
        var ids = idsParam.split(',').map(function(id){return parseInt(id.trim(),10)}).filter(function(v){return !isNaN(v)});
        if (ids.length<2) { statusEl.textContent='至少需要 2 个亭子 ID'; statusEl.style.background='rgba(255,200,0,.1)'; statusEl.style.color='#f39c12'; return; }

        try {
            var resp = await fetch('/thousand-pavilions/locations'), all = await resp.json();
            var selected = ids.map(function(id){return all.find(function(p){return p.id===id})}).filter(Boolean);
            if (selected.length<2) { statusEl.textContent='无法找到足够的亭子数据'; statusEl.style.background='rgba(255,0,0,.1)'; statusEl.style.color='#e74c3c'; return; }

            var coords = selected.map(function(p){return toCoord(p.longitude,p.latitude)});
            var pl = L.polyline(coords, {color:'#27ae60',weight:4}).addTo(map);
            selected.forEach(function(p){
                L.marker(toCoord(p.longitude,p.latitude)).addTo(map).bindPopup('<b>'+p.chineseName+'</b><br>'+(p.typeLabel||p.type||''));
            });
            map.fitBounds(pl.getBounds(), {padding:[30,30]});

            var div = document.createElement('div');
            div.style.cssText = 'background:rgba(255,255,255,.04);border-radius:6px;padding:12px';
            var title = document.createElement('b');
            title.style.color = '#a4bfef';
            title.textContent = '路线站点';
            div.appendChild(title);
            selected.forEach(function(p,i){
                var step = document.createElement('div');
                step.className = 'route-step';
                step.innerHTML = '<b>'+(i+1)+'. '+p.chineseName+'</b><br><small style="color:#888">'+(p.typeLabel||p.type||'')+'</small>';
                div.appendChild(step);
            });
            listEl.innerHTML = '';
            listEl.appendChild(div);

            statusEl.textContent='已加载 '+selected.length+' 个亭子的分享路线';
            statusEl.style.background='rgba(0,255,0,.06)'; statusEl.style.color='#2ecc71';
        } catch(e) {
            statusEl.textContent='加载失败: '+e.message;
            statusEl.style.background='rgba(255,0,0,.1)'; statusEl.style.color='#e74c3c';
        }
    }

    load();
})();
</script>
</body>
</html>
